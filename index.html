<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1e3a2f">
  <meta name="description" content="Terénní aplikace ČSOP Trosečníci – sdílená mapa, trasy, deník, hodiny a finance.">
  <title>Trosečníci – terén</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ PŘIHLÁŠENÍ ============ -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-scene" aria-hidden="true">
        <span class="sun"></span>
        <span class="cloud c1"></span>
        <span class="cloud c2"></span>
        <span class="bfly">🦋</span>
        <svg class="cow" viewBox="0 0 170 130" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#d98545"/><stop offset="1" stop-color="#b5611f"/>
            </linearGradient>
          </defs>
          <g class="cow-body">
            <!-- ocas -->
            <g class="tail">
              <path d="M138 70 q14 8 9 28" fill="none" stroke="#7a4a22" stroke-width="5" stroke-linecap="round"/>
              <circle cx="147" cy="100" r="6" fill="#3f2412"/>
            </g>
            <!-- nohy -->
            <g fill="#5c3a1d">
              <rect x="60" y="86" width="11" height="30" rx="5"/>
              <rect x="86" y="88" width="11" height="28" rx="5"/>
              <rect x="108" y="86" width="11" height="30" rx="5"/>
              <rect x="128" y="88" width="11" height="28" rx="5"/>
            </g>
            <!-- tělo -->
            <ellipse cx="100" cy="66" rx="50" ry="33" fill="url(#fur)"/>
            <!-- chlupaté chmýří dole -->
            <g fill="#a9571c">
              <path d="M62 88 l7 12 l7 -12 z"/><path d="M80 92 l7 12 l7 -12 z"/>
              <path d="M100 93 l7 12 l7 -12 z"/><path d="M120 92 l7 12 l7 -12 z"/>
            </g>
            <!-- hlava -->
            <g class="cow-head">
              <ellipse cx="44" cy="74" rx="30" ry="27" fill="url(#fur)"/>
              <!-- uši -->
              <ellipse cx="22" cy="58" rx="9" ry="6" fill="#9c5018" transform="rotate(-25 22 58)"/>
              <ellipse cx="60" cy="55" rx="9" ry="6" fill="#9c5018" transform="rotate(20 60 55)"/>
              <!-- rohy -->
              <path d="M30 52 q-14 -6 -22 4 q10 0 16 8" fill="#efe2c4" stroke="#cdb98a" stroke-width="1.5"/>
              <path d="M58 50 q14 -8 24 0 q-11 -1 -18 8" fill="#efe2c4" stroke="#cdb98a" stroke-width="1.5"/>
              <!-- čenich -->
              <ellipse cx="40" cy="92" rx="18" ry="12" fill="#ecd9c2"/>
              <circle cx="34" cy="92" r="2.4" fill="#5c3a1d"/><circle cx="46" cy="92" r="2.4" fill="#5c3a1d"/>
              <!-- oči -->
              <g class="eyes"><circle cx="33" cy="74" r="3.4" fill="#2b1a0d"/><circle cx="55" cy="73" r="3.4" fill="#2b1a0d"/></g>
              <!-- ofina -->
              <g class="fringe" fill="#a9571c">
                <path d="M20 54 q4 22 0 30 q-6 -10 -8 -22 z"/>
                <path d="M30 52 l4 32 l5 -30 z"/>
                <path d="M42 52 l3 34 l5 -32 z"/>
                <path d="M54 53 l4 30 l6 -26 z"/>
              </g>
            </g>
          </g>
        </svg>
        <span class="meadow"></span>
      </div>
      <h1>Trosečníci&nbsp;·&nbsp;terén</h1>
      <p class="login-sub">Terénní aplikace ČSOP&nbsp;Trosečníci<br>Rudoltička a lokality v&nbsp;okolí Ostrova</p>
      <form id="login-form" autocomplete="off">
        <label>Přístupové heslo
          <input id="login-code" type="password" inputmode="text" placeholder="tvé osobní heslo" required>
        </label>
        <label id="login-name-wrap" hidden>Tvé jméno
          <input id="login-name" type="text" inputmode="text" placeholder="např. Tonda" maxlength="40">
        </label>
        <button id="login-btn" class="btn-primary" type="submit">Vstoupit</button>
        <p id="login-error" class="login-error" hidden></p>
      </form>
      <p class="login-foot">Data jsou sdílená v&nbsp;rámci týmu a uložená bezpečně.
        <a href="https://www.csoptrosecnici.cz" target="_blank" rel="noopener">csoptrosecnici.cz</a>
      </p>
    </div>
  </div>

  <!-- ============ APLIKACE ============ -->
  <div id="app" hidden>
    <header id="app-header">
      <div class="brand"><span class="brand-mark">🐄</span> Trosečníci <span class="brand-loc">Rudoltička</span></div>
      <button id="user-chip" type="button" aria-label="Uživatel a menu"><span id="user-name">–</span> ⋯</button>
    </header>

    <main id="views">
      <!-- MAPA -->
      <section class="view" id="view-map" data-tab="map">
        <div id="map"></div>
        <div id="map-tools">
          <button id="btn-add-point" class="tool-btn" type="button">📍 Bod</button>
          <button id="btn-add-area" class="tool-btn" type="button">⬠ Plocha</button>
          <button id="btn-locate" class="tool-btn" type="button">🧭 Poloha</button>
          <button id="btn-map-menu" class="tool-btn" type="button">☰</button>
        </div>
      </section>

      <!-- TRASA -->
      <section class="view scrollable" id="view-track" data-tab="track" hidden></section>

      <!-- DENÍK -->
      <section class="view scrollable" id="view-diary" data-tab="diary" hidden></section>

      <!-- HODINY + ODMĚNY -->
      <section class="view scrollable" id="view-time" data-tab="time" hidden></section>

      <!-- FINANCE -->
      <section class="view scrollable" id="view-finance" data-tab="finance" hidden></section>

      <!-- LOKALITY -->
      <section class="view scrollable" id="view-localities" data-tab="localities" hidden></section>
    </main>

    <nav id="tabbar">
      <button class="tab" data-tab="map" type="button"><span class="ti">🗺️</span><span class="tl">Mapa</span></button>
      <button class="tab" data-tab="track" type="button"><span class="ti">🥾</span><span class="tl">Trasa</span></button>
      <button class="tab" data-tab="diary" type="button"><span class="ti">📓</span><span class="tl">Deník</span></button>
      <button class="tab" data-tab="time" type="button"><span class="ti">⏱️</span><span class="tl">Hodiny</span></button>
      <button class="tab" data-tab="finance" type="button"><span class="ti">💰</span><span class="tl">Finance</span></button>
    </nav>
  </div>

  <!-- ============ SDÍLENÉ OVERLAYE ============ -->
  <div id="toast" hidden></div>
  <div id="backdrop" hidden></div>
  <div id="sheet-host"></div>

  <!-- menu mapy (body/plochy) -->
  <div id="map-menu-panel" class="sheet" hidden>
    <div class="sheet-handle"></div>
    <h2>Mapa</h2>
    <button id="btn-point-here" class="menu-item" type="button">📍 Přidat bod na mé poloze</button>
    <button id="btn-home" class="menu-item" type="button">🏞️ Zobrazit celý tok</button>
    <button id="btn-import-areas" class="menu-item" type="button">🛡️ Načíst chráněná území (AOPK + ÚSES)</button>
    <button id="btn-export" class="menu-item" type="button">⬇️ Exportovat body (GeoJSON)</button>
    <button id="btn-map-menu-close" class="menu-item secondary" type="button">Zavřít</button>
  </div>

  <!-- hlavní menu (uživatel) -->
  <div id="app-menu" class="sheet" hidden>
    <div class="sheet-handle"></div>
    <h2 id="app-menu-title">Účet</h2>
    <button id="btn-localities" class="menu-item" type="button">📍 Lokality ve správě</button>
    <button id="btn-refresh-all" class="menu-item" type="button">🔄 Načíst nejnovější data</button>
    <a class="menu-item" href="https://www.csoptrosecnici.cz" target="_blank" rel="noopener">🌐 csoptrosecnici.cz</a>
    <button id="btn-logout" class="menu-item danger" type="button">Odhlásit se</button>
    <button id="btn-app-menu-close" class="menu-item secondary" type="button">Zavřít</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
