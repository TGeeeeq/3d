<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1e3a2f">
  <title>Lukávka – mapa poznámek</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="map"></div>

  <div id="toast" hidden></div>

  <nav id="toolbar">
    <button id="btn-add-point" class="tool-btn" type="button">📍 Bod</button>
    <button id="btn-add-area" class="tool-btn" type="button">⬠ Plocha</button>
    <button id="btn-locate" class="tool-btn" type="button">🧭 Poloha</button>
    <button id="btn-menu" class="tool-btn" type="button">☰ Menu</button>
  </nav>

  <div id="menu-panel" class="sheet" hidden>
    <div class="sheet-handle"></div>
    <h2>Menu</h2>
    <button id="btn-point-here" class="menu-item" type="button">📍 Přidat bod na mé poloze</button>
    <button id="btn-export" class="menu-item" type="button">⬇️ Exportovat poznámky (GeoJSON)</button>
    <button id="btn-import" class="menu-item" type="button">⬆️ Importovat poznámky</button>
    <button id="btn-home" class="menu-item" type="button">🏞️ Zpět na celý tok</button>
    <button id="btn-menu-close" class="menu-item secondary" type="button">Zavřít</button>
    <input id="import-file" type="file" accept=".geojson,.json,application/geo+json,application/json" hidden>
  </div>

  <div id="note-sheet" class="sheet" hidden>
    <div class="sheet-handle"></div>
    <h2 id="note-sheet-title">Nová poznámka</h2>
    <div id="color-row">
      <button class="color-swatch" data-color="#e53935" type="button" aria-label="Červená"></button>
      <button class="color-swatch" data-color="#1e88e5" type="button" aria-label="Modrá"></button>
      <button class="color-swatch" data-color="#fdd835" type="button" aria-label="Žlutá"></button>
      <button class="color-swatch" data-color="#43a047" type="button" aria-label="Zelená"></button>
    </div>
    <textarea id="note-text" rows="3" placeholder="Např.: Tady roste hromada bodláku…"></textarea>
    <div class="sheet-buttons">
      <button id="btn-save" class="primary" type="button">Uložit</button>
      <button id="btn-edit-shape" type="button" hidden>Upravit tvar</button>
      <button id="btn-delete" class="danger" type="button" hidden>Smazat</button>
      <button id="btn-cancel" class="secondary" type="button">Zrušit</button>
    </div>
  </div>

  <div id="backdrop" hidden></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
